name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Release macOS app
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build macOS app
        run: |
          xcodebuild build \
            -project McFind.xcodeproj \
            -scheme McFind \
            -configuration Release \
            -destination "platform=macOS"

      - name: Ad-hoc sign the app
        run: |
          BUILD_DIR=$(xcodebuild -project McFind.xcodeproj -scheme McFind -configuration Release -showBuildSettings | grep -m 1 "BUILD_DIR" | cut -d'=' -f2 | xargs)
          echo "Signing app at: $BUILD_DIR/Release/McFind.app"
          codesign --force --deep --sign - "$BUILD_DIR/Release/McFind.app"
          codesign --verify --verbose "$BUILD_DIR/Release/McFind.app"

      - name: Install DMG tools
        run: |
          brew install create-dmg
          python3 -m venv /tmp/dmg-venv
          source /tmp/dmg-venv/bin/activate
          pip install Pillow

      - name: Create DMG
        run: |
          source /tmp/dmg-venv/bin/activate
          BUILD_DIR=$(xcodebuild -project McFind.xcodeproj -scheme McFind -configuration Release -showBuildSettings | grep -m 1 "BUILD_DIR" | cut -d'=' -f2 | xargs)
          echo "Build directory: $BUILD_DIR"
          ./scripts/create-dmg.sh "$BUILD_DIR/Release/McFind.app"
          
          # Create installer package
          pkgbuild --root "$BUILD_DIR/Release/McFind.app" --identifier com.mcfind.McFind --version 1.0 --install-location /Applications McFind.pkg
      
      - name: List files for release
        run: |
          echo "Files to be uploaded:"
          ls -la McFind.dmg McFind.pkg || echo "Some files not found"
          echo "File sizes:"
          du -h McFind.dmg McFind.pkg 2>/dev/null || echo "Some files not found"
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            McFind.dmg
            McFind.pkg
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 McFind.dmg | awk '{print $1}')

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/ntufar/homebrew-tap.git" /tmp/homebrew-tap

          cat > /tmp/homebrew-tap/Casks/mcfind.rb <<EOF
          cask "mcfind" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/ntufar/mcfind/releases/download/v#{version}/McFind.dmg"
            name "McFind"
            desc "Fast macOS file search utility inspired by Everything on Windows"
            homepage "https://ntufar.github.io/mcfind/"

            app "McFind.app"

            zap trash: [
              "~/Library/Application Support/McFind",
              "~/Library/Preferences/com.mcfind.McFind.plist",
              "~/Library/Caches/com.mcfind.McFind",
            ]
          end
          EOF

          cd /tmp/homebrew-tap
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add Casks/mcfind.rb
          git commit -m "mcfind ${VERSION}"
          git push
