<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0051D5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E8F0FF;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)"/>

  <!-- Magnifying glass circle (glass part) -->
  <circle cx="200" cy="200" r="130" fill="url(#glassGradient)" stroke="#FFFFFF" stroke-width="20"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#0051D5" stroke-width="8" opacity="0.3"/>

  <!-- Handle -->
  <path d="M 295 295 L 420 420" stroke="#FFFFFF" stroke-width="45" stroke-linecap="round"/>
  <path d="M 420 420 L 440 440" stroke="#FFFFFF" stroke-width="50" stroke-linecap="round"/>

  <!-- Search lines inside glass -->
  <line x1="160" y1="165" x2="240" y2="165" stroke="#007AFF" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="160" y1="200" x2="240" y2="200" stroke="#007AFF" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
  <line x1="160" y1="235" x2="210" y2="235" stroke="#007AFF" stroke-width="12" stroke-linecap="round" opacity="0.6"/>

  <!-- Sparkle effect -->
  <circle cx="140" cy="140" r="8" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="260" cy="160" r="6" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="385" cy="385" r="10" fill="#FFFFFF" opacity="0.7"/>
</svg>
